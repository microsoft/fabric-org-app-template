id: org-app
name: Org App
version: 1.0.0
services:
    auth:
        enabled: true
        fabric:
            enabled: true
        allowedRedirectUris:
            - http://localhost:5173
    data:
        enabled: false
    storage:
        enabled: false
    staticHosting:
        enabled: true
        folder: dist
        buildCommand: npm run build
        indexDocument: index.html
